name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ats
          POSTGRES_PASSWORD: ats_password
          POSTGRES_DB: ats_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ats -d ats_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      SECRET_KEY: ci-secret
      AI_PROVIDER: local
      POSTGRES_HOST: localhost
      POSTGRES_DB: ats_test
      DATABASE_URL: postgresql+psycopg://ats:ats_password@localhost:5432/ats_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm
      - name: Run migrations
        run: alembic upgrade head
      - name: Run tests with coverage
        run: pytest -q --cov=app --cov-report=term-missing --cov-report=xml
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Type check & build
        run: npm run build
      - name: Unit tests with coverage
        run: npm run test:coverage
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
